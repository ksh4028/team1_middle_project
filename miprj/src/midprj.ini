[synonym_map]
파일이름 = 파일명
금액 = 예산
사업비 = 예산
마감일 = 입찰 참여 마감일
공고번호 = 공고 번호
공고차수 = 공고 차수
발주기관 = 발주 기관
사업요약 = 사업 요약
파일형식 = 파일 형식
파일명 = 파일명
공개일자 = 공개 일자
입찰참여시작일 = 입찰 참여 시작일
입찰참여마감일 = 입찰 참여 마감일

[query_list]
items =
    예산이 1억 이상 3억 이하의 제안요구서를 알려 줘.
    교육 관련 이면서 IT 관련 제안요구서를 찾아 줘.
    이전 질문과 관련해서 콘텐츠 개발 관리 및 모니터링 업무 요구사항을 더 자세히 알려 줘.
    국민연금공단 이러닝시스템 관련 사업 요구사항을 정리해 줘.
    이전 질문과 관련해서 교육·학습 관련 타 기관 발주 사업이 있는지 알려 줘.
    주요 기관(예: 기초과학연구원, 한국원자력연구원) 사업의 AI 예측·사업 목적을 설명해 줘.
    1년 이상의 사업 기간이 요구되는 제안요구서를 찾아 줘.

[core_feature_keywords]
items =
    핵심 기능
    공통적으로
    공통
    주요 기능
    핵심 요구
    요구하는 핵심

[ollama_model]
#address     =  http://34.45.125.252:11434/
address     =  http://midprj.duckdns.org:11434/
llm_model_name = exaone3.5:7.8b
embedding_model_name = bge-m3
temperature = 0.2

; OpenAI 모델 설정
[openai_model]
llm_model_name = gpt-5-mini
embedding_model_name = text-embedding-3-small
temperature = 0.2

[LLM_SELECTOR]
# LLM 기반만 사용 (gpt 또는 ollama만 허용)
eval        = openai   # 평가
reranker    = openai   # 리랭킹 (gpt 또는 ollama만 허용)
preprocess  = openai   # 도메인 분류
pdf_summary = openai   # PDF 요약

[HISTORY]
max_turns = 3
persist = false
session_id =
budget_ratio = 0.2
budget_min_tokens = 64
budget_max_tokens = 256

[adobe]
model_name = gpt-5-mini
max_elements = 10000
chunk_size = 150
